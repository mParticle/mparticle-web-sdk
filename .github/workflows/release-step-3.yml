name: 'Release - Step 3: Generate Release Notes, Publish to NPM and CDN'

on:
    workflow_dispatch:
        inputs:
            dryRun:
                description: 'Do a dry run to preview instead of a real release [true/false]'
                required: true
                default: 'true'

# Prevent race between staging and release workflows
concurrency:
    group: staging-pipeline
    cancel-in-progress: false

jobs:
    confirm-staging-branch:
        name: Confirm release is run from staging
        runs-on: ubuntu-latest
        steps:
            - name: Branch Check
              run: |
                  if [ "${{ github.ref_name }}" != "staging" ]; then
                      echo "Release must be run from the staging branch, not '${{ github.ref_name }}'"
                      exit 1
                  fi

    release:
        name: Perform Release
        runs-on: ubuntu-latest
        needs: confirm-staging-branch

        # OIDC permissions for npm trusted publishing
        permissions:
            contents: write
            issues: write
            pull-requests: write
            id-token: write

        env:
            GITHUB_TOKEN: ${{ secrets.MP_SEMANTIC_RELEASE_BOT }}
            GIT_AUTHOR_NAME: mparticle-automation
            GIT_AUTHOR_EMAIL: developers@mparticle.com
            GIT_COMMITTER_NAME: mparticle-automation
            GIT_COMMITTER_EMAIL: developers@mparticle.com

        steps:
            - name: Checkout staging branch
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: staging
                  token: ${{ secrets.MP_SEMANTIC_RELEASE_BOT }}

            - name: Import GPG Key
              uses: crazy-max/ghaction-import-gpg@e00cb83a68c1158b29afc5217dd0582cada6d172 #v4.4.0
              with:
                  gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
                  passphrase: ${{ secrets.GPG_PASSPHRASE }}
                  git_user_signingkey: true
                  git_commit_gpgsign: true

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: latest
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: npm ci

            - name: Release --dry-run
              if: ${{ github.event.inputs.dryRun == 'true' }}
              run: npx semantic-release --dry-run

            # NPM Publish happens here via OIDC trusted publishing
            - name: Release
              if: ${{ github.event.inputs.dryRun == 'false' }}
              run: npx semantic-release

            - name: Archive npm failure logs
              uses: actions/upload-artifact@v6
              if: failure()
              with:
                  name: npm-logs
                  path: ~/.npm/_logs

            - name: Push release commits to main
              if: ${{ github.event.inputs.dryRun == 'false' }}
              run: git push origin HEAD:main
